<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Belivia Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --a-primary:   #1e5a8e;
      --a-primary-d: #154275;
      --a-text:      #1f2d3d;
      --a-soft:      #55687a;
      --a-bg:        #f2f5f9;
      --a-white:     #ffffff;
      --a-border:    #d4dde9;
      --a-radius:    5px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: var(--a-text);
      background: var(--a-bg);
      padding: 24px 20px 48px;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--a-text);
      margin-bottom: 24px;
    }

    .box {
      background: var(--a-white);
      border: 1px solid var(--a-border);
      border-radius: var(--a-radius);
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    .box h2 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--a-soft);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--a-border);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .controls label { font-size: 0.9rem; color: var(--a-soft); }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
      font-size: 0.9rem;
    }

    th, td {
      border: 1px solid var(--a-border);
      padding: 9px 12px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #edf1f7;
      font-weight: 600;
      font-size: 0.82rem;
      color: var(--a-soft);
      white-space: nowrap;
    }

    tr:hover td { background: #f6f9fd; }

    /* Detail view */
    #requestDetail p { margin-bottom: 10px; font-size: 0.93rem; }
    #requestDetail h3 { font-size: 1rem; font-weight: 700; margin: 20px 0 10px; }
    #requestDetail ul { padding-left: 18px; }
    #requestDetail li { margin-bottom: 4px; font-size: 0.93rem; }

    /* Forms & inputs */
    code {
      background: #edf1f7;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.85em;
      color: var(--a-text);
    }

    button {
      background: var(--a-primary);
      color: #fff;
      border: none;
      border-radius: var(--a-radius);
      padding: 7px 14px;
      font-size: 0.88rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: var(--a-primary-d); }

    select {
      border: 1px solid var(--a-border);
      border-radius: var(--a-radius);
      padding: 6px 10px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--a-text);
      background: var(--a-white);
    }

    textarea {
      border: 1px solid var(--a-border);
      border-radius: var(--a-radius);
      padding: 8px 10px;
      font-family: inherit;
      font-size: 0.93rem;
      color: var(--a-text);
      background: var(--a-white);
      resize: vertical;
    }

    p { margin-bottom: 6px; }
  </style>
</head>
<body>
  <h1>Belivia Admin</h1>

  <div class="box">
    <h2>Tagesübersicht</h2>
    <div id="overview">Lädt...</div>
  </div>

  <div class="box">
    <h2>Letzte Anfragen</h2>
    <div class="controls">
      <label for="statusFilter">Status:</label>
      <select id="statusFilter">
        <option value="">alle</option>
        <option value="new">new</option>
        <option value="in_progress">in_progress</option>
        <option value="done">done</option>
        <option value="archived">archived</option>
      </select>
      <button id="reloadBtn">Neu laden</button>
    </div>
    <div id="requests">Lädt...</div>
  </div>

  <div class="box">
    <h2>Anfrage-Details</h2>
    <div id="requestDetail">Noch keine Anfrage ausgewählt.</div>
  </div>

  <script>
    let cachedItems = [];
    let selectedId = null;

    function esc(s) {
      if (s == null) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function fmtDate(s) {
      if (!s) return '';
      const parts = s.split('-');
      if (parts.length === 3) return parts[2] + '.' + parts[1] + '.' + parts[0];
      return s;
    }

    function fmt(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      if (isNaN(d)) return ts;
      return d.toLocaleString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    async function loadOverview() {
      let d;
      try {
        const r = await fetch('/api/admin/day-overview');
        d = await r.json();
      } catch (e) {
        document.getElementById('overview').innerHTML = '<p>Fehler beim Laden der Übersicht.</p>';
        return;
      }
      const byStatus = d.created_by_status || {};
      const statusParts = ['new','in_progress','done','archived']
        .filter(s => byStatus[s])
        .map(s => s + ': ' + byStatus[s])
        .join(', ');

      let overviewHtml = '<p><strong>Tag:</strong> ' + fmtDate(d.day) + '</p>';
      overviewHtml += '<p><strong>Heute erstellt:</strong> ' + d.created_total + (statusParts ? ' &nbsp;<span style="color:#888;font-size:0.9em;">(' + statusParts + ')</span>' : '') + '</p>';
      overviewHtml += '<p><strong>Termine am Tag:</strong> ' + d.events_total + '</p>';

      if (d.events_on_day && d.events_on_day.length) {
        overviewHtml += '<ul style="margin:4px 0 0 0;padding-left:20px;">';
        for (const ev of d.events_on_day) {
          overviewHtml += '<li>' + esc(ev.name) + ' — ' + esc(ev.email) + (ev.phone ? ' — ' + esc(ev.phone) : '') + ' <code>' + esc(ev.status) + '</code></li>';
        }
        overviewHtml += '</ul>';
      }

      document.getElementById('overview').innerHTML = overviewHtml;
    }

    async function loadRequests() {
      const status = document.getElementById('statusFilter').value;
      const url = status ? '/api/admin/requests?limit=100&status=' + encodeURIComponent(status) : '/api/admin/requests?limit=100';

      let d;
      try {
        const r = await fetch(url);
        d = await r.json();
      } catch (e) {
        document.getElementById('requests').innerHTML = '<p>Fehler beim Laden der Anfragen.</p>';
        return;
      }

      if (!d.items || !d.items.length) {
        cachedItems = [];
        document.getElementById('requests').innerHTML = '<p>Keine Anfragen vorhanden.</p>';
        return;
      }

      cachedItems = d.items;
      let html = '<p style="margin:0 0 8px;color:#888;font-size:0.9em;">' + d.items.length + ' Anfragen</p>';
      html += '<div class="table-wrap"><table><thead><tr>';
      html += '<th>ID</th><th>Erstellt</th><th>Name</th><th>E-Mail</th><th>Status</th><th>Interne Mail</th><th>Interne Mail versucht</th><th>Event</th><th>Notiz</th>';
      html += '</tr></thead><tbody>';

      for (const item of d.items) {
        const rowBg = item.mail_status === 'failed' ? '#fff0f0' : (item.id === selectedId ? '#e8f4ff' : '');
        const note = item.internal_note || '';
        const noteDisplay = note.length > 40 ? note.slice(0, 40) + '…' : note;
        html += '<tr onclick="loadRequestDetail(' + item.id + ')" style="cursor:pointer' + (rowBg ? ';background:' + rowBg : '') + '">';
        html += '<td>' + item.id + '</td>';
        html += '<td>' + fmt(item.created_at) + '</td>';
        html += '<td>' + esc(item.name) + '</td>';
        html += '<td>' + esc(item.email) + '</td>';
        html += '<td><code>' + item.status + '</code></td>';
        html += '<td><code>' + (item.mail_status || '') + '</code></td>';
        html += '<td>' + fmt(item.mail_last_attempt_at) + '</td>';
        html += '<td>' + fmtDate(item.event_date) + '</td>';
        html += '<td>' + esc(noteDisplay) + '</td>';
        html += '</tr>';
      }

      html += '</tbody></table></div>';
      document.getElementById('requests').innerHTML = html;
    }

    async function loadRequestDetail(requestId, scroll = true) {
      selectedId = requestId;
      const item = cachedItems.find(x => x.id === requestId);

      if (!item) {
        document.getElementById('requestDetail').innerHTML = '<p>Anfrage nicht gefunden.</p>';
        return;
      }

      let eventsData;
      try {
        const eventsRes = await fetch('/api/admin/requests/' + requestId + '/events');
        eventsData = await eventsRes.json();
      } catch (e) {
        document.getElementById('requestDetail').innerHTML = '<p>Fehler beim Laden der Details.</p>';
        return;
      }

      let html = '';
      html += '<p><strong>ID:</strong> ' + item.id + '</p>';
      html += '<p><strong>Erstellt:</strong> ' + fmt(item.created_at) + '</p>';
      html += '<p><strong>Name:</strong> ' + esc(item.name) + '</p>';
      html += '<p><strong>E-Mail:</strong> ' + esc(item.email) + '</p>';
      if (item.phone) html += '<p><strong>Telefon:</strong> ' + esc(item.phone) + '</p>';
      html += '<p><strong>Status:</strong> ' +
        '<select id="detailStatus">' +
        '<option value="new"' + (item.status === 'new' ? ' selected' : '') + '>new</option>' +
        '<option value="in_progress"' + (item.status === 'in_progress' ? ' selected' : '') + '>in_progress</option>' +
        '<option value="done"' + (item.status === 'done' ? ' selected' : '') + '>done</option>' +
        '<option value="archived"' + (item.status === 'archived' ? ' selected' : '') + '>archived</option>' +
        '</select></p>';
      html += '<p><strong>Interne Mail:</strong> <code>' + (item.mail_status || '') + '</code></p>';
      html += '<p><strong>Interne Mail versucht:</strong> ' + fmt(item.mail_last_attempt_at) + '</p>';
      if (item.mail_last_error) html += '<p><strong>Interne Mail Fehler:</strong> ' + esc(item.mail_last_error) + '</p>';

      const lastConfEvent = (eventsData.items || [])
        .filter(e => ['confirmation_mail_sent','confirmation_mail_failed','confirmation_mail_skipped'].includes(e.event_type))
        .slice(-1)[0];
      if (lastConfEvent) {
        if (lastConfEvent.event_type === 'confirmation_mail_failed') {
          html += '<p><strong>Bestätigungsmail:</strong> <code>failed</code> &nbsp; <button onclick="retryConfirmationMail(' + item.id + ')">Erneut senden</button></p>';
          html += '<div id="retryConfResult"></div>';
        } else if (lastConfEvent.event_type === 'confirmation_mail_sent') {
          html += '<p><strong>Bestätigungsmail:</strong> <code>sent</code></p>';
        } else if (lastConfEvent.event_type === 'confirmation_mail_skipped') {
          html += '<p><strong>Bestätigungsmail:</strong> <code>skipped</code></p>';
        }
      }
      if (item.event_date) html += '<p><strong>Event-Datum:</strong> ' + fmtDate(item.event_date) + '</p>';
      html += '<p><strong>Notiz:</strong><br>' +
        '<textarea id="detailNote" rows="4" style="width:100%;">' + esc(item.internal_note) + '</textarea></p>';
      html += '<p><button onclick="saveRequestDetail(' + item.id + ')">Speichern</button></p>';
      html += '<div id="detailSaveResult"></div>';
      html += '<p><strong>Nachricht:</strong><br><span style="white-space:pre-wrap">' + esc(item.message) + '</span></p>';

      html += '<h3>Events</h3>';
      if (!eventsData.items || !eventsData.items.length) {
        html += '<p>Keine Events vorhanden.</p>';
      } else {
        html += '<ul>';
        for (const ev of eventsData.items) {
          html += '<li><strong>' + fmt(ev.created_at) + '</strong> — ' + esc(ev.event_type) + ' — ' + esc(ev.event_data) + '</li>';
        }
        html += '</ul>';
      }

      document.getElementById('requestDetail').innerHTML = html;
      if (scroll) document.getElementById('requestDetail').scrollIntoView();
    }


    async function saveRequestDetail(requestId) {
      const status = document.getElementById('detailStatus').value;
      const note = document.getElementById('detailNote').value;
      const resultBox = document.getElementById('detailSaveResult');

      resultBox.innerHTML = '<p>Speichere...</p>';

      let statusRes, noteRes;
      try {
        [statusRes, noteRes] = await Promise.all([
          fetch('/api/admin/requests/' + requestId + '/status?status=' + encodeURIComponent(status), { method: 'POST' }),
          fetch('/api/admin/requests/' + requestId + '/note', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ internal_note: note }) })
        ]);
      } catch (e) {
        resultBox.innerHTML = '<p>Netzwerkfehler beim Speichern.</p>';
        return;
      }

      if (!statusRes.ok || !noteRes.ok) {
        resultBox.innerHTML = '<p>Speichern fehlgeschlagen.</p>';
        return;
      }

      resultBox.innerHTML = '<p>Gespeichert.</p>';
      setTimeout(() => { if (resultBox) resultBox.innerHTML = ''; }, 3000);
      await loadRequests();
      await loadRequestDetail(requestId, false);
    }

    async function retryConfirmationMail(requestId) {
      const resultBox = document.getElementById('retryConfResult');
      resultBox.innerHTML = '<p>Sende...</p>';
      let res, d;
      try {
        res = await fetch('/api/admin/requests/' + requestId + '/retry-confirmation-mail', { method: 'POST' });
        d = await res.json();
      } catch (e) {
        resultBox.innerHTML = '<p>Netzwerkfehler beim Senden.</p>';
        return;
      }
      if (res.ok && d.status === 'sent') {
        resultBox.innerHTML = '<p>Bestätigungsmail gesendet.</p>';
      } else {
        resultBox.innerHTML = '<p>Fehlgeschlagen: ' + esc(d.detail || d.status || 'Fehler') + '</p>';
      }
      await loadRequestDetail(requestId, false);
    }

    document.getElementById('reloadBtn').addEventListener('click', loadRequests);
    document.getElementById('statusFilter').addEventListener('change', loadRequests);

    Promise.all([loadOverview(), loadRequests()]);
  </script>
</body>
</html>
