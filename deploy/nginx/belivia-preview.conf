server {
    listen 127.0.0.1:8081;
    server_name new.belivia-alltagsbegleitung.de;

    root /srv/belivia/frontend-preview;
    index index.html;

    access_log /var/log/nginx/belivia-preview.access.log;
    error_log /var/log/nginx/belivia-preview.error.log;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve pages directly without redirect (no trailing-slash redirect issue)
    location = /impressum {
        try_files /impressum/index.html =404;
    }

    location = /datenschutz {
        try_files /datenschutz/index.html =404;
    }

    location = /leistungen {
        try_files /leistungen/index.html =404;
    }

    location = /fuer-angehoerige {
        try_files /fuer-angehoerige/index.html =404;
    }

    location = /ueber-belivia {
        try_files /ueber-belivia/index.html =404;
    }

    location = /faq {
        try_files /faq/index.html =404;
    }

    location = /kontakt {
        try_files /kontakt/index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
